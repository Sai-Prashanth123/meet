# Meetily Cloud Backend — Nginx reverse-proxy and rate-limiting config
# Handles WebSocket upgrades, SSL termination, and per-IP rate limiting.
#
# Usage (production):
#   docker run -v $(pwd)/nginx.conf:/etc/nginx/conf.d/meetily.conf nginx:alpine
#
# Adjust server_name, ssl_certificate paths, and upstream addresses for your
# deployment environment.

# Rate-limit zones (defined in http block — include from nginx.conf main file)
limit_req_zone  $binary_remote_addr  zone=auth_limit:10m  rate=5r/m;
limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=60r/m;
limit_conn_zone $binary_remote_addr  zone=ws_conn:10m;

# Upstream pools
upstream gateway {
    server gateway:8002;
    keepalive 64;
}

upstream auth {
    server auth:8001;
    keepalive 16;
}

upstream api {
    server api:8003;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    # Redirect all plain-HTTP to HTTPS in production
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.meetily.ai;  # replace with your domain

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ----------------------------------------------------------------
    # /stream — WebSocket endpoint for live audio streaming
    # ----------------------------------------------------------------
    location /stream {
        proxy_pass         http://gateway;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        # Keep WebSocket connections alive for up to 1 hour
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Limit concurrent WebSocket connections per IP
        limit_conn ws_conn 10;
    }

    # ----------------------------------------------------------------
    # /auth — Authentication service
    # ----------------------------------------------------------------
    location /auth/ {
        proxy_pass         http://auth;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # 5 req/min rate limit; burst of 10 to absorb short spikes
        limit_req zone=auth_limit burst=10 nodelay;
    }

    # ----------------------------------------------------------------
    # /api — REST API service
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # 60 req/min rate limit; burst of 30
        limit_req zone=api_limit burst=30 nodelay;
    }

    # Health-check endpoints (no rate limit)
    location = /health {
        proxy_pass http://api/health;
    }
}
